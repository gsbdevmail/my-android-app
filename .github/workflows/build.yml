name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2

    - name: Build Debug APK
      run: |
        gradle assembleDebug --no-daemon > build.log 2>&1 || true
        echo "=== CRITICAL ERROR SNAPSHOT ==="
        grep -E -i -A 3 -B 2 "error|failed|exception|does not exist" build.log || cat build.log | tail -n 30
        exit $(grep -q "BUILD SUCCESSFUL" build.log && echo 0 || echo 1)
